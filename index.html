<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Status Dashboard</title>
<style>
:root{color-scheme:light;--bg:#f4f3ef;--panel:#fff;--ink:#1c1b19;--ink-soft:#56544f;--ink-faint:#8c8a83;--line:#e7e5df;--line-strong:#d8d5cd;--green:#2f7d57;--green-bg:#e9f3ed;--green-ring:#bfe0cd;--amber:#b9821a;--amber-bg:#f7efdd;--amber-ring:#ecd9ab;--red:#b5402f;--red-bg:#f6e7e3;--red-ring:#ecc4bb;--radius:16px;--shadow:0 1px 2px rgba(28,27,25,.04),0 8px 24px rgba(28,27,25,.05)}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.serif{font-family:ui-serif,Georgia,"Times New Roman",serif}
.wrap{max-width:1180px;margin:0 auto;padding:32px 28px 80px}
.masthead{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;margin-bottom:22px}
.masthead h1{font-size:30px;line-height:1.1;margin:0;letter-spacing:-.01em;font-weight:600}
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:8px}
.updated{font-size:12px;color:var(--ink-faint);text-align:right}
.updated b{color:var(--ink-soft);font-weight:600;display:block}
.reload{margin-top:8px;font-size:11px;color:var(--ink-faint);background:none;border:1px solid var(--line-strong);border-radius:8px;padding:4px 10px;cursor:pointer}
.reload:hover{color:var(--ink);border-color:var(--ink-faint)}
.summary{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 24px;margin-bottom:24px}
.summary-top{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:18px}
.health-pill{display:inline-flex;align-items:center;gap:9px;font-weight:600;font-size:15px;padding:9px 16px;border-radius:999px}
.health-pill .dot{width:11px;height:11px;border-radius:50%}
.health-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:18px}
.metric{background:var(--panel);padding:14px 16px}
.metric .n{font-size:26px;font-weight:600;letter-spacing:-.02em;line-height:1}
.metric .l{font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em;margin-top:6px;font-weight:600}
.metric .n.g{color:var(--green)}.metric .n.y{color:var(--amber)}.metric .n.r{color:var(--red)}
.callouts{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.callout{border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:var(--bg)}
.callout .k{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:6px}
.callout .k .tag{width:7px;height:7px;border-radius:50%}
.callout .v{font-size:14px;color:var(--ink);font-weight:500}
.section-head{display:flex;align-items:baseline;gap:12px;margin:34px 2px 16px}
.section-head h2{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin:0}
.section-head .rule{flex:1;height:1px;background:var(--line)}
.legend{display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft)}
.legend span{display:inline-flex;align-items:center;gap:7px}
.legend .dot{width:9px;height:9px;border-radius:50%}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
.card .stripe{height:4px;width:100%}
.stripe.green{background:var(--green)}.stripe.yellow{background:var(--amber)}.stripe.red{background:var(--red)}
.card-body{padding:18px 20px 20px}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card-head .name{font-size:18px;font-weight:600;letter-spacing:-.01em}
.status-chip{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 11px 5px 9px;border-radius:999px;white-space:nowrap;border:1px solid transparent}
.status-chip .dot{width:9px;height:9px;border-radius:50%}
.status-chip.green{color:var(--green);background:var(--green-bg);border-color:var(--green-ring)}.status-chip.green .dot{background:var(--green)}
.status-chip.yellow{color:var(--amber);background:var(--amber-bg);border-color:var(--amber-ring)}.status-chip.yellow .dot{background:var(--amber)}
.status-chip.red{color:var(--red);background:var(--red-bg);border-color:var(--red-ring)}.status-chip.red .dot{background:var(--red)}
.summary-line{font-size:14px;color:var(--ink-soft);margin:10px 0 16px;font-style:italic}
.field{margin-bottom:13px}
.field .lab{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin-bottom:3px}
.field .val{font-size:13.5px;color:var(--ink)}
.meta{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);margin-top:4px;padding-top:12px;font-size:12px;color:var(--ink-faint)}
.meta .owner b{color:var(--ink-soft);font-weight:600}
.card.parent{grid-column:1/-1}
.subs{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:6px}
.sub{border:1px solid var(--line);border-radius:12px;padding:13px 15px;background:var(--bg)}
.sub-head{display:flex;justify-content:space-between;align-items:center;gap:10px}
.sub-head .sname{font-size:13.5px;font-weight:600}
.sub .ssum{font-size:12.5px;color:var(--ink-soft);margin:7px 0 9px;font-style:italic}
.sub .snext{font-size:12px;color:var(--ink)}
.sub .snext .lab{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin-right:5px}
.mini-chip{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:999px;border:1px solid transparent}
.mini-chip .dot{width:7px;height:7px;border-radius:50%}
.mini-chip.green{color:var(--green);background:var(--green-bg);border-color:var(--green-ring)}.mini-chip.green .dot{background:var(--green)}
.mini-chip.yellow{color:var(--amber);background:var(--amber-bg);border-color:var(--amber-ring)}.mini-chip.yellow .dot{background:var(--amber)}
.mini-chip.red{color:var(--red);background:var(--red-bg);border-color:var(--red-ring)}.mini-chip.red .dot{background:var(--red)}
.table-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{text-align:left;font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;padding:13px 14px;background:var(--bg);border-bottom:1px solid var(--line-strong);white-space:nowrap}
tbody td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:top;color:var(--ink-soft)}
tbody tr:last-child td{border-bottom:none}
tbody tr.sub-row td:first-child{padding-left:30px;color:var(--ink-faint)}
tbody td.name-cell{color:var(--ink);font-weight:600}
.tdot{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.tdot .d{width:8px;height:8px;border-radius:50%}
.tdot.green{color:var(--green)}.tdot.green .d{background:var(--green)}
.tdot.yellow{color:var(--amber)}.tdot.yellow .d{background:var(--amber)}
.tdot.red{color:var(--red)}.tdot.red .d{background:var(--red)}
.notes{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.note-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px}
.note-card h3{font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin:0 0 12px;display:flex;align-items:center;gap:8px}
.note-card h3 .ic{width:8px;height:8px;border-radius:2px}
.note-card.wins h3 .ic{background:var(--green)}
.note-card.questions h3 .ic{background:var(--amber)}
.note-card.decisions h3 .ic{background:var(--red)}
.note-card.followups h3 .ic{background:var(--ink-soft)}
.note-list{list-style:none;margin:0;padding:0}
.note-list li{position:relative;padding:6px 6px 6px 18px;font-size:13px;color:var(--ink);border-bottom:1px dashed var(--line)}
.note-list li:last-child{border-bottom:none}
.note-list li::before{content:"";position:absolute;left:2px;top:13px;width:5px;height:5px;border-radius:50%;background:var(--ink-faint)}
.foot{font-size:11.5px;color:var(--ink-faint);text-align:center;margin-top:30px;padding-top:18px;border-top:1px solid var(--line)}
.login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10}
.login form{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:34px 32px;width:340px;text-align:center}
.login h1{font-size:22px;font-weight:600;margin:0 0 4px}
.login p{font-size:13px;color:var(--ink-faint);margin:0 0 20px}
.login input{width:100%;padding:11px 13px;font-size:14px;border:1px solid var(--line-strong);border-radius:10px;margin-bottom:12px;outline:none}
.login input:focus{border-color:var(--ink-faint)}
.login button{width:100%;padding:11px;font-size:14px;font-weight:600;color:#fff;background:var(--ink);border:none;border-radius:10px;cursor:pointer}
.login .err{color:var(--red);font-size:12.5px;margin-bottom:10px;min-height:1px}
.hidden{display:none}
@media(max-width:820px){.cards,.notes,.callouts,.subs{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.wrap{padding:22px 16px 64px}}
</style>
</head>
<body>

<div class="login" id="login">
  <form id="loginForm" autocomplete="off">
    <div class="eyebrow">Operating Review</div>
    <h1 class="serif">Portfolio Status</h1>
    <p>Enter the team password to continue.</p>
    <div class="err" id="loginErr"></div>
    <input type="password" id="pw" placeholder="Password" autocomplete="current-password">
    <button type="submit" id="loginBtn">View dashboard</button>
  </form>
</div>

<div class="wrap hidden" id="app"></div>

<script>
const API = "https://jckrrcrcioxrntlwynht.supabase.co/functions/v1/portfolio-api";
const KEYNAME = "pp_key";
const esc = s => (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const sLabel = s => s==="green"?"Green":s==="yellow"?"Yellow":"Red";

async function load(key){
  const r = await fetch(API, { headers: { "x-portfolio-key": key } });
  if(r.status===401) throw new Error("unauthorized");
  if(!r.ok) throw new Error("fetch failed");
  return await r.json();
}

function render(data){
  const items = data.items||[], notes = data.notes||[];
  const m = {}; (data.meta||[]).forEach(x=>m[x.key]=x.value);
  const companies = items.filter(i=>i.kind==="company").sort((a,b)=>a.sort-b.sort);
  const subsOf = id => items.filter(i=>i.kind==="sub"&&i.parent===id).sort((a,b)=>a.sort-b.sort);
  let g=0,y=0,r=0; companies.forEach(c=>{c.status==="green"?g++:c.status==="yellow"?y++:r++;});
  let health="Healthy",hc="var(--green)",hb="var(--green-bg)";
  if(r>0){health="Attention Required";hc="var(--red)";hb="var(--red-bg)";}
  else if(y>0){health="Stable — Watching";hc="var(--amber)";hb="var(--amber-bg)";}
  const title = m.portfolio_title||"Portfolio Status Dashboard";
  const now = new Date().toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
  const chip=(s,cls)=>`<span class="${cls} ${esc(s)}"><span class="dot"></span>${sLabel(s)}</span>`;
  const tdot=s=>`<span class="tdot ${esc(s)}"><span class="d"></span>${sLabel(s)}</span>`;

  const cards = companies.map(c=>{
    const subs=subsOf(c.id);
    let subsHtml="";
    if(subs.length){
      subsHtml=`<div class="field" style="margin-top:4px"><div class="lab">Sub-Initiatives</div></div><div class="subs">`+
        subs.map(s=>`<div class="sub"><div class="sub-head"><span class="sname">${esc(s.name)}</span>${chip(s.status,"mini-chip")}</div><div class="ssum">${esc(s.summary)}</div><div class="snext"><span class="lab">Next</span>${esc(s.next_action)}</div></div>`).join("")+`</div>`;
    }
    const pri=c.priorities?`<div class="field"><div class="lab">Key Priorities</div><div class="val">${esc(c.priorities)}</div></div>`:"";
    const rk=c.risks?`<div class="field"><div class="lab">Risks / Blockers</div><div class="val">${esc(c.risks)}</div></div>`:"";
    return `<div class="card ${subs.length?"parent":""}"><div class="stripe ${esc(c.status)}"></div><div class="card-body"><div class="card-head"><div class="name">${esc(c.name)}</div>${chip(c.status,"status-chip")}</div><div class="summary-line">${esc(c.summary)}</div>${pri}${rk}<div class="field"><div class="lab">Next Action</div><div class="val">${esc(c.next_action)}</div></div>${subsHtml}<div class="meta"><span class="owner">Owner · <b>${esc(c.owner)}</b></span><span>Updated ${esc(c.updated_label)}</span></div></div></div>`;
  }).join("");

  let rows="";
  companies.forEach(c=>{
    rows+=`<tr><td class="name-cell">${esc(c.name)}</td><td>${tdot(c.status)}</td><td>${esc(c.summary)}</td><td>${esc(c.priorities||"—")}</td><td>${esc(c.risks||"—")}</td><td>${esc(c.next_action)}</td><td>${esc(c.owner||"—")}</td><td>${esc(c.updated_label||"—")}</td></tr>`;
    subsOf(c.id).forEach(s=>{rows+=`<tr class="sub-row"><td>↳ ${esc(s.name)}</td><td>${tdot(s.status)}</td><td>${esc(s.summary)}</td><td>—</td><td>—</td><td>${esc(s.next_action)}</td><td>${esc(c.owner||"—")}</td><td>${esc(s.updated_label||"—")}</td></tr>`;});
  });

  const nm=[["wins","Wins"],["questions","Open Questions"],["decisions","Decisions Needed"],["followups","Follow-ups"]];
  const notesHtml=nm.map(([k,t])=>{
    const list=notes.filter(n=>n.section===k).sort((a,b)=>a.sort-b.sort);
    const lis=list.map(n=>`<li>${esc(n.item)}</li>`).join("")||'<li style="color:var(--ink-faint)">—</li>';
    return `<div class="note-card ${k}"><h3><span class="ic"></span>${t}</h3><ul class="note-list">${lis}</ul></div>`;
  }).join("");

  document.getElementById("app").innerHTML=`
    <div class="masthead"><div><div class="eyebrow">Operating Review</div><h1 class="serif">${esc(title)}</h1></div>
    <div class="updated">Last loaded<b>${now}</b><button class="reload" id="reloadBtn">Reload</button></div></div>
    <div class="summary"><div class="summary-top"><div class="health-label">Overall Portfolio Health</div>
    <div class="health-pill" style="background:${hb};color:${hc}"><span class="dot" style="background:${hc}"></span>${health}</div></div>
    <div class="metrics"><div class="metric"><div class="n">${companies.length}</div><div class="l">Total Companies</div></div>
    <div class="metric"><div class="n g">${g}</div><div class="l">Green</div></div>
    <div class="metric"><div class="n y">${y}</div><div class="l">Yellow</div></div>
    <div class="metric"><div class="n r">${r}</div><div class="l">Red</div></div></div>
    <div class="callouts"><div class="callout"><div class="k"><span class="tag" style="background:var(--red)"></span>Biggest Risk This Week</div><div class="v">${esc(m.biggest_risk)}</div></div>
    <div class="callout"><div class="k"><span class="tag" style="background:var(--ink)"></span>Highest Priority This Week</div><div class="v">${esc(m.top_priority)}</div></div></div></div>
    <div class="section-head"><h2>Companies</h2><div class="rule"></div><div class="legend"><span><span class="dot" style="background:var(--green)"></span>On track</span><span><span class="dot" style="background:var(--amber)"></span>Needs attention</span><span><span class="dot" style="background:var(--red)"></span>At risk</span></div></div>
    <div class="cards">${cards}</div>
    <div class="section-head"><h2>Quick Scan</h2><div class="rule"></div></div>
    <div class="table-wrap"><table><thead><tr><th>Company / Initiative</th><th>Status</th><th>Summary</th><th>Priority</th><th>Risk</th><th>Next Action</th><th>Owner</th><th>Updated</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="section-head"><h2>Weekly Operating Notes</h2><div class="rule"></div></div>
    <div class="notes">${notesHtml}</div>
    <div class="foot">Live from Supabase · updates post from Slack · password-protected</div>`;
  document.getElementById("reloadBtn").addEventListener("click",refresh);
}

async function refresh(){
  const key=sessionStorage.getItem(KEYNAME); if(!key) return;
  try{ render(await load(key)); }catch(e){ if(e.message==="unauthorized"){ sessionStorage.removeItem(KEYNAME); showLogin(); } }
}
function showApp(){ document.getElementById("login").classList.add("hidden"); document.getElementById("app").classList.remove("hidden"); }
function showLogin(){ document.getElementById("app").classList.add("hidden"); document.getElementById("login").classList.remove("hidden"); }

document.getElementById("loginForm").addEventListener("submit",async e=>{
  e.preventDefault();
  const key=document.getElementById("pw").value.trim();
  const err=document.getElementById("loginErr"); const btn=document.getElementById("loginBtn");
  err.textContent=""; btn.textContent="Checking…"; btn.disabled=true;
  try{
    const data=await load(key);
    sessionStorage.setItem(KEYNAME,key);
    showApp(); render(data);
  }catch(ex){
    err.textContent = ex.message==="unauthorized" ? "Incorrect password. Try again." : "Couldn't reach the dashboard. Try again.";
  }finally{ btn.textContent="View dashboard"; btn.disabled=false; }
});

(function init(){
  const key=sessionStorage.getItem(KEYNAME);
  if(key){ load(key).then(d=>{showApp();render(d);}).catch(()=>{ sessionStorage.removeItem(KEYNAME); showLogin(); }); }
  else showLogin();
})();
</script>
</body>
</html>
